<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>番茄钟</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 窗口标题栏 -->
  <div class="titlebar">
    <span class="titlebar-text">🍅 番茄钟</span>
    <div class="titlebar-actions">
      <button class="titlebar-btn" onclick="window.electronAPI.minimizeWindow()">─</button>
      <button class="titlebar-btn close" onclick="window.electronAPI.closeWindow()">✕</button>
    </div>
  </div>

  <!-- 模式切换 -->
  <div class="mode-switch">
    <button class="mode-btn active" data-mode="work">专注</button>
    <button class="mode-btn" data-mode="shortBreak">短休息</button>
    <button class="mode-btn" data-mode="longBreak">长休息</button>
  </div>

  <!-- 倒计时环形进度 -->
  <div class="timer-container">
    <svg class="progress-ring" viewBox="0 0 220 220">
      <circle class="progress-bg" cx="110" cy="110" r="100" />
      <circle class="progress-fill" cx="110" cy="110" r="100" />
    </svg>
    <div class="timer-display">
      <span id="minutes">25</span><span class="colon">:</span><span id="seconds">00</span>
    </div>
    <div class="timer-phase" id="phaseLabel">专注时间</div>
  </div>

  <!-- 控制按钮 -->
  <div class="controls">
    <button class="ctrl-btn" id="skipBtn" title="跳过当前阶段">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="5 4 15 12 5 20 5 4" /><line x1="19" y1="5" x2="19" y2="19" />
      </svg>
    </button>
    <button class="ctrl-btn primary" id="mainBtn">
      <span class="icon-play">▶</span>
      <span class="icon-pause" style="display:none">⏸</span>
    </button>
    <button class="ctrl-btn" id="resetBtn" title="重置">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10" /><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
      </svg>
    </button>
  </div>

  <!-- 统计 -->
  <div class="stats">
    <span id="pomodoroCount">完成番茄: 0</span>
  </div>

  <!-- 设置 -->
  <div class="settings-toggle" onclick="toggleSettings()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3" />
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
    </svg>
    设置
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="setting-row">
      <label>专注 (分钟)</label>
      <input type="number" id="workTime" value="25" min="1" max="120" />
    </div>
    <div class="setting-row">
      <label>短休息 (分钟)</label>
      <input type="number" id="shortBreakTime" value="5" min="1" max="60" />
    </div>
    <div class="setting-row">
      <label>长休息 (分钟)</label>
      <input type="number" id="longBreakTime" value="15" min="1" max="120" />
    </div>
    <div class="setting-row">
      <label>长休息间隔 (番茄数)</label>
      <input type="number" id="longBreakInterval" value="4" min="1" max="10" />
    </div>
    <button class="save-btn" onclick="saveSettings()">保存设置</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
